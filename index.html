<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ultra Assistant V17 DUAL</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --accent: #8b5cf6;
            --bg: #000000; 
            --text: #f8fafc;
            --green-outline: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 15px;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 650px; }

        .card {
            background: #000000;
            padding: 25px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            background: linear-gradient(45deg, #10b981, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.2rem;
            margin-bottom: 5px;
            font-weight: 900;
        }

        .tagline { text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 25px; }

        .section-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input, textarea, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border-radius: 14px;
            background: #111111;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            border: 2px solid var(--green-outline) !important;
            outline: none;
        }

        .btn-main {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: white;
            padding: 18px;
            border-radius: 14px;
            border: none;
            width: 100%;
            font-weight: 800;
            cursor: pointer;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        
        .btn-sub {
            background: #111111;
            color: white;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            border: 2px solid var(--green-outline) !important;
        }

        #settings {
            display: none; 
            padding: 20px;
            background: #0a0a0a;
            border-radius: 18px;
            margin-bottom: 20px;
            border: 2px solid var(--accent);
        }

        #response {
            padding: 20px;
            border-radius: 18px;
            background: #000000;
            display: none;
            line-height: 1.6;
            white-space: pre-wrap;
            border: 2px solid var(--green-outline) !important;
            margin-top: 10px;
        }

        .loader {
            display: none;
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(16, 185, 129, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>ULTRA ASSISTANT</h1>
        <p class="tagline">Gemini 2.0 & 2.5 | Dual Flash Engine</p>

        <div style="text-align: right; margin-bottom: 15px;">
            <button class="btn-sub" onclick="toggleSettings()"><i class="fas fa-sliders-h"></i> Expert Opties</button>
        </div>

        <div id="settings">
            <label class="section-label">Selecteer AI Model</label>
            <select id="modelSelect">
                <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash (Snelheid) ⚡</option>
                <option value="gemini-2.5-flash">Gemini 2.5 Flash (Superieur) 🧠</option>
            </select>
            
            <label class="section-label">AI Persona</label>
            <select id="persona">
                <option value="Behulpzame Assistent">Standaard Assistent 🤖</option>
                <option value="Directiesecretaresse">Directiesecretaresse 🏢</option>
                <option value="Juridisch Adviseur">Juridisch Adviseur ⚖️</option>
                <option value="Creatieve Copywriter">Creatieve Copywriter ✍️</option>
                <option value="Technisch Schrijver">Technisch Schrijver 🛠️</option>
                <option value="Marketing Expert">Marketing Expert 📈</option>
                <option value="Professor">Professor 🎓</option>
                <option value="Klantenservice">Klantenservice 📞</option>
                <option value="Motiverende Coach">Motiverende Coach 🏆</option>
            </select>
            
            <label class="section-label">Creativiteit (Temperatuur)</label>
            <input type="range" id="temp" min="0" max="10" value="7">
        </div>

        <label class="section-label">API Sleutel</label>
        <input type="password" id="apiKey" placeholder="Plak Gemini sleutel...">

        <label class="section-label">Configuratie</label>
        <div class="grid">
            <select id="langTo">
                <option value="none">Niet vertalen</option>
                <option value="Nederlands">Nederlands 🇳🇱</option>
                <option value="Engels">Engels 🇬🇧</option>
                <option value="Duits">Duits 🇩🇪</option>
            </select>
            <select id="tone">
                <option value="normaal">Standaard</option>
                <option value="formeel">Formeel</option>
                <option value="informeel">Informeel</option>
                <option value="zakelijk">Zakelijk</option>
            </select>
        </div>

        <label class="section-label">Tekst Invoer</label>
        <textarea id="userInput" rows="5" placeholder="Typ of plak hier je tekst..."></textarea>

        <button class="btn-main" onclick="runAI('general')">
            <i class="fas fa-bolt"></i> START ANALYSE
        </button>

        <div class="action-grid">
            <button class="btn-sub" onclick="runAI('spellcheck')">Spelling 🇳🇱</button>
            <button class="btn-sub" onclick="runAI('grammar')">Grammatica ✍️</button>
            <button class="btn-sub" onclick="runAI('summarize')">Samenvatten 📝</button>
            <button class="btn-sub" onclick="runAI('rewrite')">Herschrijven 🔄</button>
        </div>

        <div id="loader" class="loader"></div>
        <div id="response"></div>
    </div>
</div>

<script>
    window.onload = () => {
        const savedKey = localStorage.getItem('v17_dual_key');
        if (savedKey) document.getElementById('apiKey').value = savedKey;
    };

    function toggleSettings() {
        const s = document.getElementById('settings');
        s.style.display = (s.style.display === 'none' || s.style.display === '') ? 'block' : 'none';
    }

    async function runAI(mode) {
        const key = document.getElementById('apiKey').value.trim();
        const text = document.getElementById('userInput').value;
        const model = document.getElementById('modelSelect').value;
        const persona = document.getElementById('persona').value;
        const tone = document.getElementById('tone').value;
        const lang = document.getElementById('langTo').value;
        const temperature = document.getElementById('temp').value / 10;
        
        const resBox = document.getElementById('response');
        const loader = document.getElementById('loader');

        if (!key || !text) { alert("Sleutel en tekst zijn verplicht!"); return; }
        localStorage.setItem('v17_dual_key', key);

        resBox.style.display = 'none';
        loader.style.display = 'block';

        let instruction = `Persona: ${persona}. Toon: ${tone}. Taak: ${mode}. `;
        if (lang !== 'none') instruction += `Antwoord in het ${lang}. `;
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: instruction + "\n\nInhoud: " + text }] }],
                    generationConfig: { temperature: temperature }
                })
            });
            const data = await response.json();
            loader.style.display = 'none';
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                resBox.innerText = data.candidates[0].content.parts[0].text;
                resBox.style.display = 'block';
            } else {
                resBox.innerText = "Error: Model weigert of sleutel onjuist.";
                resBox.style.display = 'block';
            }
        } catch (e) { 
            loader.style.display = 'none'; 
            resBox.innerText = "Systeemfout: " + e.message;
            resBox.style.display = 'block';
        }
    }
</script>
</body>
</html>
