<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ultra Assistant V17 MASTER</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --accent: #8b5cf6; --bg: #000000; --text: #f8fafc; --green-outline: #10b981; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; padding: 15px; min-height: 100vh; }
        .container { width: 100%; max-width: 650px; }
        .card { background: #000000; padding: 25px; border-radius: 28px; border: 1px solid rgba(255, 255, 255, 0.1); }
        h1 { text-align: center; background: linear-gradient(45deg, #10b981, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.2rem; font-weight: 900; margin-bottom: 5px; }
        .tagline { text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 25px; }
        .section-label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.75rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1.5px; }
        input, textarea, select { width: 100%; padding: 14px; margin-bottom: 18px; border-radius: 14px; background: #111111; color: white; font-size: 16px; box-sizing: border-box; border: 2px solid var(--green-outline) !important; outline: none; }
        .btn-main { background: linear-gradient(45deg, var(--primary), var(--accent)); color: white; padding: 18px; border-radius: 14px; border: none; width: 100%; font-weight: 800; cursor: pointer; font-size: 1.1rem; margin-bottom: 15px; }
        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-sub { background: #111111; color: white; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 0.85rem; border: 2px solid var(--green-outline) !important; }
        #settings { display: none; padding: 20px; background: #0a0a0a; border-radius: 18px; margin-bottom: 20px; border: 2px solid var(--accent); }
        .red-zone-translator { display: none; background: rgba(139, 92, 246, 0.15); padding: 15px; border-radius: 18px; margin-bottom: 15px; border: 2px solid var(--accent); align-items: center; gap: 10px; }
        #response { padding: 20px; border-radius: 18px; background: #000000; display: none; line-height: 1.6; white-space: pre-wrap; border: 2px solid var(--green-outline) !important; margin-top: 10px; }
        .loader { display: none; margin: 20px auto; width: 40px; height: 40px; border: 4px solid rgba(16, 185, 129, 0.1); border-left-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Smart Writing Assistant</h1>
        <p class="tagline">Gemini 2.0 & 2.5 | Ultimate Edition</p>
        <div style="text-align: right; margin-bottom: 15px;"><button class="btn-sub" onclick="toggleSettings()"><i class="fas fa-sliders-h"></i> Expert Opties</button></div>
        <div id="settings">
            <label class="section-label">AI Model</label>
            <select id="modelSelect">
                <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash ⚡</option>
                <option value="gemini-2.5-flash">Gemini 2.5 Flash 🧠</option>
            </select>
            <label class="section-label">AI Persona</label>
            <select id="persona">
                <option value="Algemene behulpzame assistent">Standaard Assistent 🤖</option>
                <option value="Ervaren Directiesecretaresse">Directiesecretaresse 🏢</option>
                <option value="Juridisch Expert en Adviseur">Juridisch Adviseur ⚖️</option>
                <option value="Creatieve High-End Copywriter">Creatieve Copywriter ✍️</option>
                <option value="Academisch Professor">Professor 🎓</option>
                <option value="Elite Motiverende Coach">Motiverende Coach 🏆</option>
                <option value="Technisch Schrijver en Documentalist">Technisch Schrijver 🛠️</option>
                <option value="Marketing & Strategie Expert">Marketing Expert 📈</option>
                <option value="Klantenservice Specialist">Klantenservice Pro 📞</option>
                <option value="Data Analist en Statisticus">Data Analist 📊</option>
                <option value="Medisch Adviseur (Informatief)">Medisch Adviseur 🏥</option>
                <option value="Social Media Manager">Social Media Expert 📱</option>
                <option value="Financieel Adviseur">Financieel Adviseur 💰</option>
                <option value="HR & Recruitment Specialist">HR Specialist 🤝</option>
                <option value="SEO & Content Optimizer">SEO Specialist 🔍</option>
                <option value="Software Engineer & Architect">Developer/Architect 💻</option>
                <option value="Psycholoog en Gesprekspartner">Psycholoog 🧠</option>
                <option value="Filosoof en Kritisch Denker">Filosoof 🏛️</option>
                <option value="Luxe Lifestyle Blogger">Lifestyle Editor ✨</option>
                <option value="Strenge Tekst-Editor">Strenge Editor 📏</option>
            </select>
            <label class="section-label">Creativiteit (0=Strak, 10=Wild)</label>
            <input type="range" id="temp" min="0" max="10" value="7">
        </div>
        <label class="section-label">API Sleutel (Auto-Save)</label>
        <input type="password" id="apiKey" placeholder="Plak Gemini sleutel..." oninput="saveKeyManually()">
        <div class="grid">
            <select id="langTo"><option value="none">Niet vertalen</option><option value="Nederlands">Nederlands 🇳🇱</option><option value="Engels">Engels 🇬🇧</option><option value="Duits">Duits 🇩🇪</option><option value="Frans">Frans 🇫🇷</option><option value="Spaans">Spaans 🇪🇸</option></select>
            <select id="tone"><option value="normaal">Standaard Toon</option><option value="formeel">Formeel</option><option value="zakelijk">Zakelijk</option><option value="informeel">Informeel</option><option value="enthousiast">Enthousiast</option><option value="diplomatiek">Diplomatiek</option></select>
        </div>
        <textarea id="userInput" rows="5" placeholder="Typ of plak hier je tekst..."></textarea>
        <button class="btn-main" onclick="runAI('general')"><i class="fas fa-bolt"></i> START ANALYSE</button>
        <div class="action-grid">
            <button class="btn-sub" onclick="runAI('spellcheck')">Spelling 🇳🇱</button>
            <button class="btn-sub" onclick="runAI('grammar')">Grammatica ✍️</button>
            <button class="btn-sub" onclick="runAI('summarize')">Samenvatten 📝</button>
            <button class="btn-sub" onclick="runAI('rewrite')">Herschrijven 🔄</button>
        </div>
        <div id="redZoneBar" class="red-zone-translator">
            <select id="quickLang" style="margin-bottom:0; flex-grow: 1;">
                <option value="Nederlands">Nederlands 🇳🇱</option>
                <option value="Engels">Engels 🇬🇧</option>
                <option value="Duits">Duits 🇩🇪</option>
                <option value="Frans">Frans 🇫🇷</option>
            </select>
            <button class="btn-sub" style="margin-bottom:0; background:var(--accent); border:none !important;" onclick="translateOutput()">VERTAAL</button>
        </div>
        <div id="loader" class="loader"></div>
        <div id="response"></div>
    </div>
</div>
<script>
    window.onload = () => {
        const savedKey = localStorage.getItem('v17_master_key');
        if (savedKey) document.getElementById('apiKey').value = savedKey;
    };
    function saveKeyManually() {
        localStorage.setItem('v17_master_key', document.getElementById('apiKey').value.trim());
    }
    function toggleSettings() {
        const s = document.getElementById('settings');
        s.style.display = (s.style.display === 'none' || s.style.display === '') ? 'block' : 'none';
    }
    async function runAI(mode) {
        const key = document.getElementById('apiKey').value.trim();
        const text = document.getElementById('userInput').value;
        const model = document.getElementById('modelSelect').value;
        const persona = document.getElementById('persona').value;
        const tone = document.getElementById('tone').value;
        const lang = document.getElementById('langTo').value;
        const temperature = document.getElementById('temp').value / 10;
        const resBox = document.getElementById('response');
        const redZone = document.getElementById('redZoneBar');
        const loader = document.getElementById('loader');

        if (!key || !text) return alert("Sleutel en tekst invullen!");
        localStorage.setItem('v17_master_key', key);
        resBox.style.display = 'none'; redZone.style.display = 'none'; loader.style.display = 'block';

        let prompt = `Persona: ${persona}. Toon: ${tone}. Taak: ${mode}. `;
        if (lang !== 'none') prompt += `Beantwoord in het ${lang}. `;
        prompt += `\n\nTekst: ${text}`;
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: temperature } })
            });
            const data = await response.json();
            loader.style.display = 'none';
            if (data.candidates) {
                resBox.innerText = data.candidates[0].content.parts[0].text;
                resBox.style.display = 'block';
                redZone.style.display = 'flex';
            }
        } catch (e) { loader.style.display = 'none'; alert("Fout. Check sleutel/model."); }
    }
    async function translateOutput() {
        const key = document.getElementById('apiKey').value.trim();
        const currentText = document.getElementById('response').innerText;
        const targetLang = document.getElementById('quickLang').value;
        const model = document.getElementById('modelSelect').value;
        const loader = document.getElementById('loader');
        if (!currentText) return;
        loader.style.display = 'block';
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Vertaal dit naar " + targetLang + ": " + currentText }] }] })
            });
            const data = await response.json();
            loader.style.display = 'none';
            if (data.candidates) document.getElementById('response').innerText = data.candidates[0].content.parts[0].text;
        } catch (e) { loader.style.display = 'none'; }
    }
</script>
</body>
</html>
