<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ultra Assistant V17</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --bg: #000000; --card: #0a0a0a; --text: #f8fafc; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; min-height: 100vh; }
        .header { text-align: center; padding: 15px 0; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 1.5rem; letter-spacing: 2px; }
        input, textarea, select { width: 100%; background: var(--card); border: 2px solid var(--primary); border-radius: 10px; color: white; padding: 15px; font-size: 16px; margin-bottom: 15px; outline: none; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        #result { margin-top: 25px; padding: 20px; border: 2px solid var(--primary); border-radius: 10px; background: var(--card); min-height: 150px; white-space: pre-wrap; line-height: 1.6; }
        .loading { display: none; text-align: center; color: var(--primary); margin: 15px 0; font-weight: bold; }
    </style>
</head>
<body>
<div class="header"><h1>ULTRA ASSISTANT V17</h1></div>
<label style="font-size: 0.8rem; color: #94a3b8;">API SLEUTEL (AUTO-SAVE)</label>
<input type="password" id="apiKey" placeholder="Plak je Gemini sleutel...">
<select id="persona">
    <option value="Je bent een deskundige assistent.">Standaard Assistent</option>
    <option value="Je bent een creatieve copywriter.">Creatieve Copywriter</option>
    <option value="Je bent een professor die alles simpel uitlegt.">De Professor</option>
</select>
<textarea id="userInput" rows="6" placeholder="Typ je bericht..."></textarea>
<button onclick="run()">START ANALYSE</button>
<div class="loading" id="loader">BEZIG MET ANALYSE...</div>
<div id="result">Resultaat verschijnt hier...</div>
<script>
    window.onload = () => {
        const key = localStorage.getItem('v17_key');
        if (key) document.getElementById('apiKey').value = key;
    };
    async function run() {
        const key = document.getElementById('apiKey').value;
        const input = document.getElementById('userInput').value;
        const persona = document.getElementById('persona').value;
        const res = document.getElementById('result');
        const load = document.getElementById('loader');
        if (!key || !input) return alert('Vul alles in!');
        localStorage.setItem('v17_key', key);
        load.style.display = 'block';
        res.innerText = 'AI denkt na...';
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: persona + " " + input }] }] })
            });
            const data = await response.json();
            res.innerText = data.candidates[0].content.parts[0].text;
        } catch (e) { res.innerText = 'Fout: Check je sleutel.'; }
        finally { load.style.display = 'none'; }
    }
</script>
</body>
</html>
