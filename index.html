<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ultra Assistant V17</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIlVsdHJhIEFzc2lzdGFudCIsCiAgInNob3J0X25hbWUiOiAiQXNzaXN0YW50IiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwMDAwMDAiLAogICJ0aGVtZV9jb2xvciI6ICIjMDAwMDAwIiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly9jZG4taWNvbnMtcG5nLmZsYXRpY29uLmNvbS81MTIvNDcxLzQ3MTY2My5wbmciLAogICAgICAic2l6ZXMiOiAiNTEyeDUxMiIsCiAgICAgICJ0eXBlIjogImltYWdlL3BuZyIKICAgIH0KICBdCn0=">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --accent: #8b5cf6;
            --bg: #000000; 
            --text: #f8fafc;
            --green-outline: #10b981;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 15px;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .container { width: 100%; max-width: 650px; }

        .card {
            background: #000000;
            padding: 25px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            background: linear-gradient(45deg, #10b981, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            margin-bottom: 5px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .tagline { text-align: center; color: #64748b; font-size: 0.85rem; margin-bottom: 25px; font-weight: 500; }

        .section-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.7rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input, textarea, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border-radius: 14px;
            background: #111111;
            color: white;
            font-size: 16px; /* Voorkomt inzoomen op iPhone */
            box-sizing: border-box;
            border: 2px solid var(--green-outline) !important;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus { border-color: var(--accent) !important; }

        .btn-main {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: white;
            padding: 18px;
            border-radius: 16px;
            border: none;
            width: 100%;
            font-weight: 800;
            cursor: pointer;
            font-size: 1.1rem;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }

        .btn-main:active { transform: scale(0.98); }

        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        
        .btn-sub {
            background: #111111;
            color: white;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            border: 2px solid var(--green-outline) !important;
            transition: 0.2s;
        }

        .btn-sub:active { background: #1a1a1a; }

        #settings {
            display: none; 
            padding: 20px;
            background: #0a0a0a;
            border-radius: 18px;
            margin-bottom: 20px;
            border: 2px solid var(--accent);
        }

        .red-zone-translator {
            display: none; 
            background: rgba(139, 92, 246, 0.1);
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 15px;
            border: 2px solid var(--accent);
            align-items: center;
            gap: 10px;
        }

        #response {
            padding: 20px;
            border-radius: 18px;
            background: #050505;
            display: none;
            line-height: 1.7;
            white-space: pre-wrap;
            border: 2px solid var(--green-outline) !important;
            margin-top: 10px;
            color: #e2e8f0;
            font-size: 0.95rem;
        }

        .loader {
            display: none;
            margin: 20px auto;
            width: 35px;
            height: 35px;
            border: 4px solid rgba(16, 185, 129, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        /* Custom range slider styling */
        input[type=range] { -webkit-appearance: none; background: transparent; border: none !important; }
        input[type=range]::-webkit-slider-runnable-track { background: #222; height: 8px; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; background: var(--accent); border-radius: 50%; margin-top: -6px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>ULTRA ASSISTANT</h1>
        <p class="tagline">Gemini 1.5 Flash | Pitch Black Edition</p>

        <div style="text-align: right; margin-bottom: 15px;">
            <button class="btn-sub" onclick="toggleSettings()"><i class="fas fa-sliders-h"></i> Expert Opties</button>
        </div>

        <div id="settings">
            <label class="section-label">AI Persona</label>
            <select id="persona">
                <option value="Je bent een behulpzame Assistent.">Standaard Assistent 🤖</option>
                <option value="Je bent een uiterst professionele directiesecretaresse.">Directiesecretaresse 🏢</option>
                <option value="Je bent een juridisch adviseur. Antwoord feitelijk en formeel.">Juridisch Adviseur ⚖️</option>
                <option value="Je bent een creatieve copywriter. Maak teksten pakkend.">Creatieve Copywriter ✍️</option>
                <option value="Je bent een technische schrijver, wees accuraat en helder.">Technisch Schrijver 🛠️</option>
                <option value="Je bent een professor die complexe dingen simpel uitlegt.">Professor 🎓</option>
                <option value="Je bent een motiverende coach.">Motiverende Coach 🏆</option>
            </select>
            <label class="section-label">Temperatuur (Creativiteit)</label>
            <input type="range" id="temp" min="0" max="10" value="7">
        </div>

        <label class="section-label">API Sleutel</label>
        <input type="password" id="apiKey" placeholder="Plak hier je Gemini sleutel...">

        <label class="section-label">Configuratie</label>
        <div class="grid">
            <select id="langTo">
                <option value="none">Niet vertalen</option>
                <option value="Nederlands">Nederlands 🇳🇱</option>
                <option value="Engels">Engels 🇬🇧</option>
                <option value="Duits">Duits 🇩🇪</option>
                <option value="Frans">Frans 🇫🇷</option>
            </select>
            <select id="tone">
                <option value="normaal">Standaard Toon</option>
                <option value="formeel">Formeel</option>
                <option value="informeel">Informeel</option>
                <option value="zakelijk">Zakelijk</option>
                <option value="enthousiast">Enthousiast</option>
            </select>
        </div>

        <label class="section-label">Tekst Invoer</label>
        <textarea id="userInput" rows="5" placeholder="Typ of plak hier je tekst..."></textarea>

        <button class="btn-main" onclick="runAI('general')">
            <i class="fas fa-bolt"></i> START ANALYSE
        </button>

        <div class="action-grid">
            <button class="btn-sub" onclick="runAI('spellcheck')">Spelling 🇳🇱</button>
            <button class="btn-sub" onclick="runAI('grammar')">Grammatica ✍️</button>
            <button class="btn-sub" onclick="runAI('summarize')">Samenvatten 📝</button>
            <button class="btn-sub" onclick="runAI('rewrite')">Herschrijven 🔄</button>
        </div>

        <div id="redZoneBar" class="red-zone-translator">
            <select id="quickLang" style="margin-bottom:0; flex-grow: 1;">
                <option value="Nederlands">Nederlands 🇳🇱</option>
                <option value="Engels">Engels 🇬🇧</option>
                <option value="Duits">Duits 🇩🇪</option>
            </select>
            <button class="btn-sub" style="margin-bottom:0; background:var(--accent); border:none !important;" onclick="translateOutput()">VERTAAL</button>
        </div>

        <div id="loader" class="loader"></div>
        <div id="response"></div>
    </div>
</div>

<script>
    // AUTO-LOAD KEY
    window.onload = function() {
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) document.getElementById('apiKey').value = savedKey;
    };

    function toggleSettings() {
        const s = document.getElementById('settings');
        s.style.display = (s.style.display === 'none' || s.style.display === '') ? 'block' : 'none';
    }

    async function runAI(mode) {
        const key = document.getElementById('apiKey').value.trim();
        const text = document.getElementById('userInput').value;
        const resBox = document.getElementById('response');
        const loader = document.getElementById('loader');
        const redZone = document.getElementById('redZoneBar');
        
        // Expert values
        const persona = document.getElementById('persona').value;
        const temp = document.getElementById('temp').value / 10;
        const tone = document.getElementById('tone').value;
        const lang = document.getElementById('langTo').value;

        if (!key || !text) { alert("Vul a.u.b. de API sleutel en tekst in!"); return; }
        localStorage.setItem('gemini_api_key', key);

        resBox.style.display = 'none';
        redZone.style.display = 'none';
        loader.style.display = 'block';

        // Uitgebreide Prompt Engineering voor de V17
        let systemPrompt = `${persona} Hanteer een ${tone} toon. `;
        if (mode === 'spellcheck') systemPrompt += "Corrigeer alleen de spelling in de tekst. ";
        if (mode === 'grammar') systemPrompt += "Verbeter de grammatica en zinsbouw. ";
        if (mode === 'summarize') systemPrompt += "Geef een bondige samenvatting. ";
        if (mode === 'rewrite') systemPrompt += "Herschrijf de tekst op een creatieve manier. ";
        if (lang !== 'none') systemPrompt += `Beantwoord in het ${lang}. `;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: systemPrompt + "\n\nTekst om te verwerken: " + text }] }],
                    generationConfig: { temperature: temp }
                })
            });
            const data = await response.json();
            loader.style.display = 'none';
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                resBox.innerText = data.candidates[0].content.parts[0].text;
                resBox.style.display = 'block';
                redZone.style.display = 'flex';
            } else {
                resBox.innerText = "Error: Controleer of je API-sleutel correct is en of je een internetverbinding hebt.";
                resBox.style.display = 'block';
            }
        } catch (e) { 
            loader.style.display = 'none'; 
            resBox.innerText = "Systeemfout: " + e.message;
            resBox.style.display = 'block';
        }
    }

    async function translateOutput() {
        const key = document.getElementById('apiKey').value.trim();
        const currentText = document.getElementById('response').innerText;
        const targetLang = document.getElementById('quickLang').value;
        const resBox = document.getElementById('response');
        const loader = document.getElementById('loader');

        if (!currentText) return;
        loader.style.display = 'block';

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Vertaal deze tekst exact naar " + targetLang + ": " + currentText }] }] })
            });
            const data = await response.json();
            loader.style.display = 'none';
            if (data.candidates) resBox.innerText = data.candidates[0].content.parts[0].text;
        } catch (e) { loader.style.display = 'none'; }
    }
</script>
</body>
</html>
